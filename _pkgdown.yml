home:
  title: scSidekick - Single-Cell & Spatial Transcriptomics Toolkit
  description: |
    A personal toolkit for scRNA-seq and spatial transcriptomics analysis built on top of Seurat. Provides enhanced visualization, pathway analysis, cell-cell communication wrappers, and automated reporting.
  links:
  - text: Report a bug
    href: https://github.com/nourabdelfattah/scSidekick/issues
